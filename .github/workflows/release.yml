name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.9.0. Leave empty to use UI/package.json."
        required: false
        default: ""
      draft:
        description: "Create the release as a draft"
        type: boolean
        required: false
        default: false
      prerelease:
        description: "Mark the release as a prerelease"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest

    env:
      REQUESTED_TAG: ${{ inputs.tag || '' }}
      RELEASE_DRAFT: ${{ inputs.draft || false }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12"
          cache: npm
          cache-dependency-path: UI/package-lock.json

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $version = (Get-Content -Raw UI/package.json | ConvertFrom-Json).version

          if ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and -not [string]::IsNullOrWhiteSpace($env:REQUESTED_TAG)) {
            $tag = $env:REQUESTED_TAG
          }
          elseif ($env:GITHUB_REF_TYPE -eq "tag") {
            $tag = $env:GITHUB_REF_NAME
          }
          else {
            $tag = "v$version"
          }

          if ($tag -notmatch "^v") {
            $tag = "v$tag"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Build release bundles
        shell: pwsh
        run: .\scripts\build-release.ps1 -Python python -ReleaseRoot release-bundles

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wallwize-${{ steps.meta.outputs.version }}-windows
          path: release-bundles/github-release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $assets = Get-ChildItem -Path "release-bundles/github-release-assets" -File | ForEach-Object { $_.FullName }
          if (-not $assets) {
            throw "No release assets were found."
          }

          $existing = gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -eq 0) {
            $uploadArgs = @("release", "upload", $env:RELEASE_TAG) + $assets + @("--repo", $env:GITHUB_REPOSITORY, "--clobber")
            & gh @uploadArgs
            exit $LASTEXITCODE
          }

          $createArgs = @(
            "release",
            "create",
            $env:RELEASE_TAG
          ) + $assets + @(
            "--repo", $env:GITHUB_REPOSITORY,
            "--target", $env:GITHUB_SHA,
            "--title", "Wallwize $env:RELEASE_VERSION",
            "--generate-notes",
            "--latest"
          )

          if ($env:RELEASE_DRAFT -eq "true") {
            $createArgs += "--draft"
          }

          if ($env:RELEASE_PRERELEASE -eq "true") {
            $createArgs += "--prerelease"
          }

          & gh @createArgs
